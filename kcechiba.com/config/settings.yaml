# 爬虫配置
spider:
  base_url: "https://www.jbljc.com"
  backup_url: "https://www.kcechiba.com" # 备用还是原来的，虽然可能不通
  mobile_ua: "Mozilla/5.0 (iPhone; CPU iPhone OS 18_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/18.0 Mobile/15E148 Safari/604.1"
  android_ua: "Mozilla/5.0 (Linux; Android 14; SM-S918B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Mobile Safari/537.36"
  delay_range: [2, 5]           # 请求延迟范围（秒）
  max_retries: 5                # 最大重试次数
  timeout: 20                   # 请求超时（秒）
  concurrent_requests: 1        # 并发数（建议保持1，避免被封）

# 数据库配置
database:
  path: "spider_v2.db"

# 爬取范围配置
crawl:
  movie:
    enabled: true
    category_id: 20             # 20=电影
    year_start: 1945            # 开始年份
    year_end: 2026              # 结束年份
    max_pages: null             # null=不限制
    fetch_rating: true          # 是否获取评分
  tv:
    enabled: true
    category_id: 28             # 28=电视剧
    year_start: 1945
    year_end: 2026
    max_pages: null
    max_episodes: null          # 每部剧最大集数限制（null=不限制）

# 任务配置
tasks:
  daily:
    max_pages: 20               # 每日增量爬取前20页
    max_items: null
  init:
    max_pages: null             # 全量初始化不限制
    max_items: null

# 导出配置
export:
  output_dir: "./data/exports"
  encoding: "utf-8-sig"
  delimiter: ","

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./data/logs/spider.log"
  max_bytes: 10485760           # 10MB
  backup_count: 5
